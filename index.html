<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZetaMart | Your Universe of Shopping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        :root {
            --main-blue: #131921;
            --light-blue: #232f3e;
            --zeta-gold: #ff9900;
            --zeta-amber: #febd69;
            --bg-gray: #eaeded;
            --card-white: #ffffff;
        }
        body {
            background-color: var(--bg-gray);
            color: #333;
        }
        header {
            background-color: var(--main-blue);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            gap: 20px;
        }
        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }
        .logo span {
            color: var(--zeta-gold);
        }
        .search-container {
            flex: 1;
            display: flex;
            max-width: 700px;
        }
        .search-bar {
            width: 100%;
            padding: 10px 15px;
            border: none;
            border-radius: 4px 0 0 4px;
            outline: none;
            font-size: 16px;
        }
        .search-btn {
            background-color: var(--zeta-amber);
            border: none;
            padding: 0 20px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
            color: white;
        }
        .cart-box {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        #cart-count {
            background-color: var(--zeta-gold);
            color: var(--main-blue);
            font-weight: bold;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 14px;
            margin-right: 5px;
        }
        .hero {
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(234,237,237,1)), 
                        url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            align-items: flex-start;
            padding: 40px;
        }
        .hero-text {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .main-container {
            max-width: 1250px;
            margin: -60px auto 40px auto;
            padding: 0 20px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }
        .product-card {
            background-color: var(--card-white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .product-rating {
            color: #de7921;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .product-price {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .add-to-cart-btn {
            background-color: var(--zeta-amber);
            border: 1px solid #a88734;
            border-radius: 4px;
            padding: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <div class="navbar">
            <a href="https://amzn.to/3TnxqwP" class="logo">Zeta<span>Mart</span></a>
            <div class="search-container">
                <input type="text" id="search-input" class="search-bar" placeholder="Search ZetaMart products...">
                <button class="search-btn" id="search-button">Search</button>
            </div>
            <div class="nav-links">
                <div>Hello, Sign In</div>
                <div class="cart-box"><span id="cart-count">0</span><span>Cart</span></div>
            </div>
        </div>
    </header>

    <div class="hero">
        <div class="hero-text">
            <h2>Welcome to ZetaMart</h2>
            <p>Explore elite gear, custom gadgets, and daily essentials.</p>
        </div>
    </div>

    <main class="main-container">
        <div class="product-grid" id="grid-display"></div>
    </main>

    <script>
        const products = [
            { id: 1, title: "Quantum Wireless Noise-Canceling Headphones", price: "$129.99", rating: "★★★★☆ (4.5)", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&q=80" },
            { id: 2, title: "AeroTrack Mechanical Ergonomic Keyboard", price: "$89.50", rating: "★★★★★ (4.8)", img: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?auto=format&fit=crop&w=400&q=80", link: "https://link.amazon/B0eWiNeaN" },
            { id: 3, title: "ChronoFit Smart Watch v4 (Waterproof)", price: "$199.00", rating: "★★★★☆ (4.2)", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=400&q=80",link: "https://link.amazon/A0aOajE9z" }
        ];

        let currentCartCount = 0;
        const gridDisplay = document.getElementById('grid-display');
        const cartCountBadge = document.getElementById('cart-count');

        function loadProducts() {
            products.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img class="product-img" src="${item.img}">
                    <div>
                        <h3 class="product-title">${item.title}</h3>
                        <div class="product-rating">${item.rating}</div>
                        <div class="product-price">${item.price}</div>
                    </div>
                    <button class="add-to-cart-btn" onclick="updateCartCounter()">Add to Cart</button>
                `;
                gridDisplay.appendChild(card);
            });
        }

        function updateCartCounter() {
            currentCartCount++;
            cartCountBadge.textContent = currentCartCount;
        }

        loadProducts();
    </script>
</body>
</html>
